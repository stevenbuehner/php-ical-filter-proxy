sources:
  kalender:
    url: "https://example.com/calendar.ics"

exports:
  technikdienst:
    title: "Technikdienst"
    slug: "technikdienst"
    token: "secret-token"
    include_sources:
      - source: kalender
        filters:
          - type: match
            match:
              summary:
                contains: "Technik"
            on_match: keep

          - type: match
            match:
              summary:
                contains: "intern"
            on_match: remove
