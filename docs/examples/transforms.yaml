sources:
  kalender:
    url: "https://example.com/calendar.ics"

exports:
  aufbereitet:
    title: "Aufbereiteter Export"
    slug: "aufbereitet"
    token: "secret-token"
    include_sources:
      - source: kalender
        filters:
          - type: match
            match:
              summary:
                contains: "Technik"
            on_match: transform
            transform:
              - type: prefix_text
                field: summary
                value: "[Technik] "
              - type: suffix_text
                field: location
                value: " (Dienst)"
              - type: replace_text
                field: description
                search: "intern"
                replace: "extern"
              - type: categories_add
                value: "Technik"
              - type: remove_property
                field: url
              - type: adjust_times
                start:
                  reference: current_start
                  offset: "-20m"
                end:
                  reference: current_start
                  offset: "10m"
