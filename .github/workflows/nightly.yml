name: Nightly

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-tests:
    name: Nightly PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare test config
        run: cp config/calendars.example.yaml config/calendars.yaml

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  proxmox-e2e:
    name: Proxmox E2E (Self-Hosted)
    runs-on: [self-hosted, proxmox]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Proxmox tooling
        run: |
          command -v pct
          command -v pvesh

      - name: Run CT script smoke test
        run: |
          bash -n ct/php-ical-filter-proxy.sh
          bash -n install/php-ical-filter-proxy-install.sh

      - name: E2E placeholder
        run: |
          echo "Implement pct-based create/install/update/destroy flow on this runner."
