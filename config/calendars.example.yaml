sources:
  kirche:
    label: "Kirchentermine"
    url: "https://example.org/kirche.ics"
    cache_ttl: "15m"
    filters:
      - type: match
        match:
          summary:
            contains_any: ["Intern", "Team-only", "Orga"]
          description:
            not_contains: "öffentlich"
        on_match: remove

      - type: match
        match:
          summary:
            regex: "/20(2[6-9]|3[0-9])/"
        on_match: keep

      - type: match
        match:
          url:
            empty: true
        on_match: transform
        transform:
          - type: replace_text
            field: url
            search: ""
            replace: "https://example.org/kalender"
          - type: prefix_text
            field: summary
            value: "[Kirche] "

      - type: match
        match:
          any: true
        on_match: transform
        transform:
          - type: adjust_times
            start:
              reference: current_start
              offset: "-20m"
            end:
              reference: current_start
              offset: "10m"

  technik:
    label: "Technikplan"
    url: "https://example.org/technik.ics"
    cache_ttl: "10m"
    filters:
      - type: match
        match:
          summary:
            regex: "/abgesagt|cancelled/i"
        on_match: remove

      - type: match
        match:
          summary:
            contains_any: ["Ton", "Licht", "Stream", "Beamer"]
        on_match: keep

      - type: match
        match:
          location:
            equals: "Hauptkirche"
        on_match: transform
        transform:
          - type: replace_text
            field: location
            search: "Hauptkirche"
            replace: "Campus Hauptkirche"

  externe_events:
    label: "Externe Events"
    url: "https://example.org/events.ics"
    cache_ttl: "30m"
    filters:
      - type: match
        match:
          summary:
            regex: "/20(2[6-9]|3[0-9])/"
        on_match: keep

      - type: match
        match:
          categories:
            not_equals: ["Intern"]
        on_match: transform
        transform:
          - type: categories_add
            value: "Extern"
          - type: categories_add
            value: "Veranstaltung"
          - type: suffix_text
            field: description
            value: "\n\nQuelle: Externer Kalender"

exports:
  sonntag_technik:
    title: "Sonntag Technikdienste"
    slug: "sonntag-technik"
    token: "random-secret-token"
    cache_ttl: "10m"
    filters:
      - type: match
        match:
          summary:
            contains: "Absage"
        on_match: remove
    include_sources:
      - source: technik
        filters:
          - type: match
            match:
              summary:
                contains: "Sonntag"
            on_match: transform
            transform:
              - type: prefix_text
                field: summary
                value: "[Dienst] "
              - type: replace_regex
                field: description
                pattern: "/\\s+/"
                replacement: " "

  oeffentlich:
    title: "Öffentlicher Kombi-Kalender"
    slug: "oeffentlich"
    token: "random-secret-token-2"
    cache_ttl: "20m"
    include_sources:
      - source: kirche
        filters:
          - type: match
            match:
              summary:
                contains_any: ["Gottesdienst", "Gebet", "Andacht"]
            on_match: keep
      - source: externe_events
        filters:
          - type: match
            match:
              categories:
                contains: "Intern"
            on_match: remove

  social_preview:
    title: "Social Preview (nur Highlights)"
    slug: "social-preview"
    token: "random-secret-token-3"
    cache_ttl: "5m"
    include_sources:
      - source: kirche
        filters:
          - type: match
            match:
              summary:
                contains_any: ["Abend", "Night", "Konzert"]
            on_match: transform
            transform:
              - type: prefix_text
                field: summary
                value: "⭐ "
              - type: suffix_text
                field: summary
                value: " (Highlight)"
              - type: categories_add
                value: "Highlight"

  transform_all_demo:
    title: "Transform All Demo"
    slug: "transform-all-demo"
    token: "random-secret-token-4"
    cache_ttl: "10m"
    include_sources:
      - source: kirche
        filters:
          - type: match
            match:
              any: true
            on_match: transform
            transform:
              - type: prefix_text
                field: summary
                value: "[Global] "
